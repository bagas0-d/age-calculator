<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
  <link href="./output.css" rel="stylesheet">
  <title>Frontend Mentor | Age calculator app</title>
</head>
<body class="flex items-center justify-center p-4 min-h-screen bg-grey-100 font-poppins">

  <div class="flex flex-col items-center justify-center p-4 pb-16 bg-white rounded-2xl rounded-br-[8rem] md:p-8   md:pb-12 lg:p-16">

    <form class="flex flex-col items-center gap-4 pt-16 border-b-grey-200 border-b-2" id="form">
      <div class="flex gap-4">
        <div class="flex flex-col flex-1 gap-2">
          <label for="day" class="text-sm font-semibold pl-2 text-grey-500">DAY</label>
          <input type="number" id="day" min="1" max="31" placeholder="DD" class="w-full border-2 border-grey-200 rounded-lg p-3 font-semibold tracking-widest focus:border-gray-400 outline-none" required>
        </div>
  
        <div class="flex flex-col flex-1 gap-2">
          <label for="month" class="text-sm font-semibold pl-2 text-grey-500">MONTH</label>
          <input type="number" id="month" min="1" max="12" placeholder="MM" class="w-full border-2 border-grey-200 rounded-lg p-3 font-semibold tracking-widest focus:border-gray-400 outline-none" required>
        </div>
  
        <div class="flex flex-col flex-1 gap-2">
          <label for="year" class="text-sm font-semibold pl-2 text-grey-500">YEAR</label>
          <input type="number" id="year" placeholder="YYYY" min="1" class="w-full border-2 border-grey-200 rounded-lg p-3 font-semibold tracking-widest focus:border-gray-400 outline-none" required> 
        </div>
      </div>
  
      <button type="submit" class="max-w-16 bg-purple-500 rounded-full translate-y-8 cursor-pointer" id="submit"><img src="../assets/images/icon-arrow.svg" class="w-full p-2"></button>
    </form>

    <div class="flex flex-col gap-4 pt-16 pl-4 w-full">
      <div class="text-5xl font-bold"><span class="text-purple-500 " id="display-year">--</span> <span>years</span></div>
      <div class="text-5xl font-bold"><span class="text-purple-500" id="display-month">--</span> <span>months</span></div>
      <div class="text-5xl font-bold"><span class="text-purple-500" id="display-day">--</span> <span>days</span></div>
    </div>

  </div>
 
  <script src="main.js"></script>
</body>
</html>
